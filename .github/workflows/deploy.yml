name: Deploying CorpersLink Frontend

on:
  push:
    branches:
      - main

concurrency:
  group: deploy-frontend
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    timeout-minutes: 20

    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install Dependencies
        run: npm ci --no-audit --no-fund

      - name: Lint
        run: npm run lint:check

      - name: Type Check
        run: npm run typecheck

      - name: Test
        run: npm run test

      - name: Build Production
        env:
          NODE_ENV: production
          VITE_API_BASE_URL: https://api.corperslink.com
          VITE_USE_MOCK_API: "false"
        run: npm run build

      - name: Verify Build
        run: |
          test -f dist/index.html

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh

          echo "${{ secrets.SSH_PRIVATE_KEY }}" | tr -d '\r' > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519

          echo "Key file diagnostics (structure only, never the key material):"
          echo "  lines: $(wc -l < ~/.ssh/id_ed25519)"
          echo "  bytes: $(wc -c < ~/.ssh/id_ed25519)"
          echo "  longest line: $(awk '{ print length }' ~/.ssh/id_ed25519 | sort -rn | head -1)"
          echo "  has BEGIN marker: $(grep -c 'BEGIN OPENSSH PRIVATE KEY' ~/.ssh/id_ed25519 || true)"
          echo "  has END marker: $(grep -c 'END OPENSSH PRIVATE KEY' ~/.ssh/id_ed25519 || true)"

          ssh-keyscan -p "${{ secrets.SSH_PORT }}" "${{ secrets.SSH_HOST }}" >> ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts

          cat >> ~/.ssh/config <<EOF
          Host deploy-target
            HostName ${{ secrets.SSH_HOST }}
            User ${{ secrets.SSH_USER }}
            Port ${{ secrets.SSH_PORT }}
            IdentityFile ~/.ssh/id_ed25519
            IdentitiesOnly yes
            ConnectTimeout 10
            ControlMaster auto
            ControlPath ~/.ssh/cm-%r@%h:%p
            ControlPersist 60s
          EOF
          chmod 600 ~/.ssh/config

      - name: Upload Release
        run: |
          STAMP=$(date +%Y%m%d%H%M%S)

          RELEASE="${{ secrets.DEPLOY_PATH }}/releases/$STAMP"

          ssh deploy-target "mkdir -p $RELEASE/dist"

          rsync \
            -az \
            --delete \
            -e ssh \
            dist/ \
            "deploy-target:$RELEASE/dist/"

          ssh deploy-target << EOF

            ln -sfn "$RELEASE" "${{ secrets.DEPLOY_PATH }}/current"

            find "${{ secrets.DEPLOY_PATH }}/releases" \
                -mindepth 1 \
                -maxdepth 1 \
                -type d \
                | sort -r \
                | tail -n +6 \
                | xargs -r rm -rf

          EOF

      - name: Health Check
        run: |
          for i in {1..20}; do

            STATUS=$(curl -fsS \
              -o /dev/null \
              -w "%{http_code}" \
              https://corperslink.com || true)

            if [ "$STATUS" = "200" ]; then
              echo "Frontend is healthy."
              exit 0
            fi

            echo "Attempt $i failed (HTTP $STATUS)"
            sleep 5

          done

          exit 1

      - name: Purge Cloudflare Cache
        run: |
          curl \
            --fail \
            --silent \
            --show-error \
            -X POST \
            "https://api.cloudflare.com/client/v4/zones/${{ secrets.CF_ZONE_ID }}/purge_cache" \
            -H "Authorization: Bearer ${{ secrets.CF_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            --data '{"files":["https://corperslink.com/","https://corperslink.com/index.html","https://corperslink.com/robots.txt","https://corperslink.com/sitemap.xml"]}'
